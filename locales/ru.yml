misc:
  discord_discovery_description: |
    FixTweetBot — это Discord-бот, который исправляет вложения из соцсетей,
    используя онлайн-сервисы (например, [FxTwitter](https://github.com/FixTweet/FxTwitter)).

    **Переходя на конкретику, бот автоматически пересылает ссылки из соцсетей в «исправленном» виде,
    в котором появляется более полноценное вложение (например, позволяющее смотреть видео
    прямо в Discord).**

    ## Возможности и особенности

    * Поддержка Twitter, Nitter, Instagram, TikTok, Reddit, Threads, Bluesky, Snapchat, Facebook, Pixiv, Twitch, Spotify,
      DeviantArt, Newgrounds, Mastodon, Tumblr, BiliBili, Pinterest, IFunny, Fur Affinity, YouTube, Imgur, Weibo,
      Rule34.xxx, Danbooru, Gelbooru, e621, e926, Realbooru, Hypnohub, Konachan, Yande.re,
      Derpibooru, Rule34.paheal, XBooru, TBIB,
      и любых других сайтов по вашему выбору
    * Перевод постов
    * Отключение обработки по сайту, каналу, пользователю, роли или ключевому слову
    * Гибкая настройка поведения и внешнего вида
    * Поддержка нескольких языков
    * Современный интерфейс для управления настройками
    * Может отвечать ботам и вебхукам
    * Поддержка Markdown
    * Уважение конфиденциальности
    * Открытый исходный код

    ## Использование

    Отправьте сообщение с ссылкой на поддерживаемую соцсеть и бот удалит вложение из вашего
    сообщения, если оно есть, и автоматически перепостит ссылку в «исправленном» виде.

    Вы также можете отключить обработку ссылки, заключив её в `< >`, например: `<https://twitter.com/...>`.

    Настройки бота доступны через команду `/settings`.

    Также вы можете использовать команду `/about`, чтобы получить больше информации о боте и посмотреть справку.
