misc:
  discord_discovery_description: |
    FixTweetBot คือบอท Discord ที่ช่วยแก้ไขการฝัง (embed) โซเชียลมีเดีย โดยใช้บริการออนไลน์ (เช่น [FxTwitter](https://github.com/FixTweet/FxTwitter))

    **พูดง่ายๆ ก็คือ บอทนี้จะทำการรีโพสต์ลิงก์โซเชียลมีเดียโดยอัตโนมัติให้เป็นเวอร์ชันที่ 'แก้ไขแล้ว' ซึ่งจะมีการฝังที่ดีกว่า (เช่น ทำให้สามารถเล่นวิดีโอได้โดยตรงใน Discord เป็นต้น)**

    ## ฟีเจอร์และจุดเด่น

    - รองรับ Twitter, Nitter, Instagram, TikTok, Reddit, Threads, Bluesky, Snapchat, Facebook, Pixiv, Twitch, Spotify, DeviantArt, Newgrounds,  Mastodon, Tumblr, BiliBili, Pinterest, IFunny, YouTube, Imgur, Weibo, Fur Affinity, Rule34.xxx, Danbooru, Gelbooru, e621, e926, Realbooru, Hypnohub, Konachan, Yande.re, Derpibooru, Rule34.paheal, XBooru, TBIB และเว็บไซต์แบบกำหนดเองอื่นๆ ที่คุณเลือก
    - การแปลโพสต์
    - ปิดการใช้งานตามเว็บไซต์, ช่อง, สมาชิก, ยศ (role) หรือคำสำคัญ (keyword)
    - ปรับแต่งพฤติกรรมและรูปลักษณ์ได้หลากหลาย
    - รองรับหลายภาษา
    - อินเทอร์เฟซที่ทันสมัยสำหรับการตั้งค่า
    - สามารถตอบสนองต่อบอทและ Webhook ได้
    - เคารพรูปแบบ Markdown
    - เคารพความเป็นส่วนตัว
    - มีซอร์สโค้ดให้ตรวจสอบ (Source-available)

    ## วิธีใช้งาน

    เพียงแค่ส่งข้อความที่มีลิงก์โซเชียลมีเดียที่รองรับ บอทจะลบการฝังเดิม (ถ้ามี) และรีโพสต์ใหม่ให้เป็นลิงก์ที่ 'แก้ไขแล้ว' โดยอัตโนมัติ

    คุณยังสามารถข้ามการแก้ไขลิงก์ได้โดยพิมพ์ "fxignore" ลงในข้อความของคุณ: การฝังแบบปกติจะถูกเก็บไว้ตามเดิม

    คุณสามารถจัดการการตั้งค่าของบอทได้ด้วยคำสั่ง `/settings`

    สุดท้ายนี้ คุณสามารถใช้คำสั่ง `/about` ได้ตลอดเวลาเพื่อดูข้อมูลเพิ่มเติมเกี่ยวกับบอทและขอความช่วยเหลือ
